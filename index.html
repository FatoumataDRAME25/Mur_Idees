<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNU IDEES</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="container-fluid p-0 m-0" style="background-color: #f1f5f9;">
    <header class="bg-light shadow-sm">
        <nav class="container-fluid  pt-2 px-5 d-flex justify-content-between align-items-center">
            <div class="">
                <h3>SUNU IDEES</h3>
                <P>Boite à idées collaborative</P>
            </div>
            <div class="rounded-pill px-2 py-1 bg-primary text-white">
                
                <span id="count-idee" class="font-semibold "></span>
            </div>
        </nav>
    </header>
    <main>
        <div class="container-fluid  p-5">
            <div class="row g-5 align-items-start">

                <aside class="col-4 bg-light rounded-4 p-3 shadow-sm border border-1">
                    <div class="container">
                        <div class="mb-4">
                            <h2>Soumettre une idée</h2>
                            <p>Proposez une idee a la communaute</p>
                        </div>
                        <form id="formulaire" class="shadow-lg p-4 rounded-4">
                            <div class="mb-4">
                                <label class=" mb-1">Titre de l'idee</label>
                                <input type="text" class="form-control form-control-lg rounded-4" id="titre" >
                            </div>

                            <div class="mb-4">
                                <label class=" mb-1">Categorie</label>
                                <select class="form-select form-select-lg rounded-4" aria-label="Large select example" id="categorie">
                                    <option value="">Selectionne une categorie</option>
                                    <option value="Pédagogie">Pédagogie</option>
                                    <option value="Événement">Événement</option>
                                    <option value="Vie de campus">Vie de campus</option>
                                    <option value="Amélioration technique">Amélioration technique</option>
                                </select>
                                
                            </div>
                            <div class="mb-4">
                                <label class=" mb-1">Description detaillee</label>
                                <textarea class="form-control rounded-4 resize-none" id="description" rows="5"></textarea>
                            </div>
                            <div class="d-grid gap-2" >
                                <button class="btn btn-primary rounded-4 btn-lg" id="btn-submit" type="submit">Soumettre l'idée</button>
                            </div>
                        </form>
                    </div>
                </aside>

                <section class="col-8">
                    <div class="bg-white border rounded-4 px-3 py-4 shadow-sm mb-4">
                        <div class="d-flex flex-column flex-xl-row align-items-center justify-content-between">
                            <div class="position-relative w-100 rounded-4" style="max-width: 600px;">
                                <i class="fa-solid fa-magnifying-glass position-absolute top-50 start-0 translate-middle-y ms-3 text-secondary" ></i>
                                <input type="text" id="input-recherche" placeholder="Rechercher des idées..." class="form-control ps-5 py-3"/>
                            </div>
                            <div class="w-100 rounded-4" style="max-width: 400px;">

                                <select
                                    id="filtrer-categorie"
                                    class="form-select py-3">

                                    <option value="Toutes">
                                        Toutes les catégories
                                    </option>

                                    <option value="Pédagogie">
                                        Pédagogie
                                    </option>

                                    <option value="Événement">
                                        Événement
                                    </option>

                                    <option value="Vie de campus">
                                        Vie de campus
                                    </option>

                                    <option value="Amélioration technique">
                                        Amélioration technique
                                    </option>

                                </select>

                            </div>
                        </div>
                    </div>
                    <div id="conteneur-idee" class="row g-4 p-3">

                        <!-- Cartes dynamiques -->

                    </div>
                    
                </section>

            </div>
        </div>
        
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
